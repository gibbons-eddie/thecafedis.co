{% extends "base.html" %}

{% block title %}Login - thecafedisco{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[70vh] px-4">
    <div class="p-8" style="width: 360px; background-color: #1a1a1a; border: 2px solid oklch(88.716% 0.09711 208.766); border-radius: 1rem;">
        <div class="mb-5 pb-3" style="border-bottom: 1px solid oklch(88.716% 0.09711 208.766 / 0.3);">
            <div class="flex items-center gap-2 mb-1">
                <span style="color: oklch(88.716% 0.09711 208.766); font-family: 'Monocraft-SemiBold', monospace;">%</span>
                <span class="font-monocraft-semibold" style="color: #ffffff;">thecafedisco --login</span>
            </div>
        </div>

        {% if messages %}
        <div class="mb-4 p-3 font-monocraft-semibold text-sm" style="background-color: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 0.5rem;">
            {% for message in messages %}
            <p style="color: #ef4444;">ERROR: {{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label for="username" class="block font-monocraft-semibold text-sm mb-2" style="color: oklch(88.716% 0.09711 208.766);">
                    <span class="text-gray-400"></span> username
                </label>
                <input
                    type="text"
                    name="username"
                    id="username"
                    required
                    autocomplete="username"
                    class="w-full p-3 font-monocraft-semibold text-white tcd-input-focus"
                    style="background-color: #0d0d0d; border-radius: 0.5rem; outline: none;"
                    placeholder="Enter username..."
                >
            </div>

            <div class="mb-5">
                <label for="password" class="block font-monocraft-semibold text-sm mb-2" style="color: oklch(88.716% 0.09711 208.766);">
                    <span class="text-gray-400"></span> password
                </label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    required
                    autocomplete="current-password"
                    class="w-full p-3 font-monocraft-semibold text-white tcd-input-focus"
                    style="background-color: #0d0d0d; border-radius: 0.5rem; outline: none;"
                    placeholder="Enter password..."
                >
            </div>

            <button
                type="submit"
                class="w-full p-3 font-monocraft-semibold font-semibold cursor-pointer tcd-hover-bright"
                style="color: #000000; border: none; border-radius: 0.5rem; transition: background-color 0.2s;"
            >
                $ login
            </button>
        </form>

        <div class="mt-5 pt-3 text-center" style="border-top: 1px solid oklch(88.716% 0.09711 208.766 / 0.3);">
            <p class="font-monocraft-semibold text-xs text-gray-500">Authorized personnel only</p>
        </div>
    </div>
</div>

<style>
    input::placeholder {
        color: #6b7280;
        opacity: 1;
    }
</style>
{% endblock content %}

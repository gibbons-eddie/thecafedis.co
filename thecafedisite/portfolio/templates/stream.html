{% extends "base.html" %}
{% load static %}

{% block title %}Stream - thecafedisco{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js"></script>
{% endblock %}

{% block content %}
<div class="flex justify-center px-4 py-8"
     x-data="streamPage()"
     x-init="init()">
    <div style="width: 100%; max-width: 900px;">

        <div class="mb-6">
            <div class="flex items-center gap-2 mb-2">
                <span style="color: oklch(88.716% 0.09711 208.766); font-family: 'Monocraft-SemiBold', monospace;">%</span>
                <span class="typewriter-header text-white text-xl">./stream --live</span>
            </div>
        </div>

        <div class="typewriter-body">

        <!-- LIVE STATE -->
        <template x-if="isLive">
            <div>
                <!-- Live indicator -->
                <div class="flex items-center gap-3 mb-4">
                    <span class="tcd-live-dot"></span>
                    <span class="font-monocraft-semibold text-sm" style="color: oklch(88.716% 0.09711 208.766);">LIVE</span>
                </div>

                <!-- Video player -->
                <div class="tcd-stream-player mb-4">
                    <div class="tcd-stream-video-wrapper">
                        <video x-ref="liveVideo"
                               class="tcd-stream-video"
                               playsinline
                               autoplay
                               @click="togglePlay()"></video>
                    </div>

                    <!-- Controls -->
                    <div class="tcd-stream-controls">
                        <div class="flex items-center gap-3 flex-1">
                            <button class="tcd-btn tcd-btn-sm" @click="togglePlay()">
                                <svg x-show="!playing" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                <svg x-show="playing" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>
                            </button>

                            <!-- Volume -->
                            <div class="flex items-center gap-2">
                                <button class="tcd-btn-fullscreen" @click="toggleMute()">
                                    <svg x-show="!muted" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                                    <svg x-show="muted" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                                </button>
                                <div class="tcd-volume-track" @click="setVolume($event)" style="width: 80px;">
                                    <div class="tcd-volume-fill" :style="'width: ' + (muted ? 0 : volume * 100) + '%'"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Quality selector -->
                        <div class="tcd-quality-dropdown" x-data="{ open: false }">
                            <button class="tcd-quality-btn" @click="open = !open">
                                <span x-text="currentQuality">auto</span>
                                <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                            </button>
                            <div class="tcd-quality-menu" x-show="open" @click.outside="open = false" x-cloak>
                                <template x-for="level in qualityLevels" :key="level.index">
                                    <button class="tcd-quality-option"
                                            :class="{ 'active': currentQualityIndex === level.index }"
                                            @click="setQuality(level.index); open = false"
                                            x-text="level.label"></button>
                                </template>
                                <button class="tcd-quality-option"
                                        :class="{ 'active': currentQualityIndex === -1 }"
                                        @click="setQuality(-1); open = false">auto</button>
                            </div>
                        </div>

                        <!-- DVR rewind -->
                        <button class="tcd-quality-btn" @click="toggleDVR()" x-show="recordingUrl">
                            <span x-text="isDVR ? 'back to live' : 'rewind'"></span>
                        </button>

                        <!-- Fullscreen -->
                        <button class="tcd-btn-fullscreen" @click="toggleFullscreen()">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Chat -->
                <div class="tcd-stream-chat" x-data="streamChat()">
                    <div class="tcd-stream-chat-header">
                        <span class="font-monocraft-semibold text-sm" style="color: oklch(88.716% 0.09711 208.766);">live chat</span>
                        <span class="font-monocraft-semibold text-xs text-gray-500" x-text="viewerCount + ' connected'"></span>
                    </div>

                    <div class="tcd-stream-chat-messages" x-ref="chatMessages">
                        <template x-for="msg in chatMessages" :key="msg.id">
                            <div class="tcd-stream-chat-msg">
                                <span class="font-monocraft-semibold text-sm" style="color: oklch(88.716% 0.09711 208.766);" x-text="msg.username + ':'"></span>
                                <span class="font-monocraft text-sm text-white" x-text="msg.text"></span>
                            </div>
                        </template>
                    </div>

                    <!-- Username gate -->
                    <div class="tcd-stream-chat-input" x-show="!chatJoined">
                        <input type="text" x-model="chatUsername"
                               class="flex-1 px-3 py-2 font-monocraft-semibold text-sm text-white tcd-input-focus"
                               style="background-color: #0d0d0d; border-radius: 0; outline: none;"
                               placeholder="enter username"
                               maxlength="50"
                               @keydown.enter="joinChat()">
                        <button class="tcd-btn px-4 py-2 font-monocraft-semibold text-sm"
                                @click="joinChat()"
                                :disabled="!chatUsername.trim()">JOIN</button>
                    </div>

                    <!-- Message input (after joining) -->
                    <div class="tcd-stream-chat-input" x-show="chatJoined" x-cloak>
                        <input type="text" x-model="chatMessage"
                               class="flex-1 px-3 py-2 font-monocraft-semibold text-sm text-white tcd-input-focus"
                               style="background-color: #0d0d0d; border-radius: 0; outline: none;"
                               placeholder="type a message..."
                               maxlength="500"
                               @keydown.enter="sendMessage()">
                        <button class="tcd-btn px-4 py-2 font-monocraft-semibold text-sm"
                                @click="sendMessage()"
                                :disabled="!chatMessage.trim()">SEND</button>
                    </div>

                    <div class="p-2 font-monocraft-semibold text-xs text-center" x-show="chatError" x-cloak
                         style="color: oklch(74.443% 0.17237 51.252);" x-text="chatError"></div>
                </div>
            </div>
        </template>

        <!-- OFFLINE STATE -->
        <template x-if="!isLive">
            <div>
                <div class="tcd-stream-offline">
                    <!-- Placeholder video -->
                    {% if stream_config.placeholder_video_url %}
                    <div class="tcd-stream-player mb-6 mx-auto" style="max-width: 960px;">
                        <div class="tcd-stream-video-wrapper" style="aspect-ratio: 4/3;">
                            <video class="tcd-stream-video"
                                   src="{{ stream_config.placeholder_video_url }}"
                                   loop autoplay muted playsinline></video>
                        </div>
                    </div>
                    {% else %}
                    <div class="tcd-stream-player mb-6 mx-auto" style="max-width: 960px;">
                        <div class="tcd-stream-video-wrapper flex items-center justify-center"
                             style="background-color: #0a0a0a; aspect-ratio: 4/3;">
                            <div class="text-center">
                                <span class="font-monocraft-semibold text-4xl" style="color: oklch(88.716% 0.09711 208.766 / 0.3);">_</span>
                                <p class="font-monocraft-semibold text-sm text-gray-500 mt-4">stream is offline</p>
                            </div>
                        </div>
                    </div>
                    {% endif %}

                    <!-- Next stream announcement -->
                    {% if stream_config.next_stream_date %}
                    <div class="p-4 mb-6" style="background-color: #1a1a1a; border: 1px solid oklch(88.716% 0.09711 208.766 / 0.3); border-radius: 0;">
                        <div class="flex items-center gap-2 mb-2">
                            <span style="color: oklch(88.716% 0.09711 208.766);">></span>
                            <span class="font-monocraft-semibold text-sm" style="color: oklch(88.716% 0.09711 208.766);">next stream</span>
                        </div>
                        {% if stream_config.next_stream_title %}
                        <p class="font-monocraft-semibold text-white mb-1">{{ stream_config.next_stream_title }}</p>
                        {% endif %}
                        <p class="font-monocraft text-sm text-gray-400">{{ stream_config.next_stream_date|date:"l, F j, Y \a\t g:i A" }}</p>
                    </div>
                    {% endif %}

                    <!-- Past streams link -->
                    {% if past_streams %}
                    <div class="mb-6">
                        <div class="flex items-center justify-between mb-3">
                            <span class="font-monocraft-semibold text-sm text-gray-400">recent streams</span>
                            <a href="{% url 'portfolio:stream_past' %}" class="font-monocraft-semibold text-sm hover:text-white transition-colors" style="color: oklch(88.716% 0.09711 208.766);">
                                view all >
                            </a>
                        </div>
                        <div class="space-y-2">
                            {% for session in past_streams %}
                            <a href="{% url 'portfolio:stream_replay' session.pk %}"
                               class="block p-3 transition-colors"
                               style="background-color: #1a1a1a; border: 1px solid oklch(88.716% 0.09711 208.766 / 0.2);"
                               up-follow>
                                <span class="font-monocraft-semibold text-sm text-white">{{ session.title }}</span>
                                <span class="font-monocraft text-xs text-gray-500 ml-2">{{ session.streamed_at|date:"M j, Y" }}</span>
                                {% if session.duration %}
                                <span class="font-monocraft text-xs text-gray-600 ml-2">{{ session.duration }}</span>
                                {% endif %}
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                    {% endif %}

                    <!-- Polling indicator -->
                    <p class="font-monocraft text-xs text-gray-600 text-center">
                        checking stream status<span x-text="pollingDots"></span>
                    </p>
                </div>
            </div>
        </template>

        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('streamPage', () => ({
        isLive: {{ is_live|yesno:"true,false" }},
        playbackUrl: '{{ playback_url }}',
        recordingUrl: '{{ recording_url }}',
        playing: false,
        muted: false,
        volume: 1,
        hls: null,
        isDVR: false,
        currentQuality: 'auto',
        currentQualityIndex: -1,
        qualityLevels: [],
        pollingDots: '',
        pollInterval: null,
        dotInterval: null,

        init() {
            if (this.isLive) {
                this.$nextTick(() => this.initPlayer());
            } else {
                this.startPolling();
            }
        },

        initPlayer() {
            const video = this.$refs.liveVideo;
            if (!video || !this.playbackUrl) return;

            if (Hls.isSupported()) {
                this.hls = new Hls({
                    lowLatencyMode: true,
                    liveSyncDurationCount: 3,
                });
                this.hls.loadSource(this.playbackUrl);
                this.hls.attachMedia(video);
                this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                    this.updateQualityLevels();
                });
                this.hls.on(Hls.Events.LEVEL_SWITCHED, () => {
                    this.updateCurrentQuality();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = this.playbackUrl;
                video.play().catch(() => {});
            }

            video.addEventListener('play', () => { this.playing = true; });
            video.addEventListener('pause', () => { this.playing = false; });
        },

        updateQualityLevels() {
            if (!this.hls) return;
            this.qualityLevels = this.hls.levels.map((level, index) => ({
                index,
                label: level.height + 'p',
                height: level.height,
            }));
        },

        updateCurrentQuality() {
            if (!this.hls) return;
            if (this.hls.autoLevelEnabled) {
                const current = this.hls.levels[this.hls.currentLevel];
                this.currentQuality = current ? 'auto (' + current.height + 'p)' : 'auto';
                this.currentQualityIndex = -1;
            } else {
                const level = this.hls.levels[this.hls.currentLevel];
                this.currentQuality = level ? level.height + 'p' : 'auto';
                this.currentQualityIndex = this.hls.currentLevel;
            }
        },

        setQuality(index) {
            if (!this.hls) return;
            if (index === -1) {
                this.hls.currentLevel = -1;
                this.currentQuality = 'auto';
                this.currentQualityIndex = -1;
            } else {
                this.hls.currentLevel = index;
                this.currentQualityIndex = index;
            }
        },

        togglePlay() {
            const video = this.$refs.liveVideo;
            if (!video) return;
            if (video.paused) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        },

        toggleMute() {
            const video = this.$refs.liveVideo;
            if (!video) return;
            this.muted = !this.muted;
            video.muted = this.muted;
        },

        setVolume(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            this.volume = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
            this.muted = false;
            const video = this.$refs.liveVideo;
            if (video) {
                video.volume = this.volume;
                video.muted = false;
            }
        },

        toggleDVR() {
            if (!this.hls) return;
            const video = this.$refs.liveVideo;
            if (this.isDVR) {
                this.hls.loadSource(this.playbackUrl);
                this.hls.attachMedia(video);
                this.isDVR = false;
            } else if (this.recordingUrl) {
                this.hls.loadSource(this.recordingUrl);
                this.hls.attachMedia(video);
                this.isDVR = true;
            }
        },

        toggleFullscreen() {
            const wrapper = this.$refs.liveVideo?.closest('.tcd-stream-player');
            if (!wrapper) return;
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                wrapper.requestFullscreen().catch(() => {});
            }
        },

        startPolling() {
            let dotCount = 0;
            this.dotInterval = setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                this.pollingDots = '.'.repeat(dotCount);
            }, 500);

            this.pollInterval = setInterval(() => {
                fetch('{% url "portfolio:stream_status" %}')
                    .then(r => r.json())
                    .then(data => {
                        if (data.is_live) {
                            this.isLive = true;
                            this.playbackUrl = data.playback_url;
                            this.recordingUrl = data.recording_url || '';
                            clearInterval(this.pollInterval);
                            clearInterval(this.dotInterval);
                            this.$nextTick(() => this.initPlayer());
                        }
                    })
                    .catch(() => {});
            }, 30000);
        },
    }));

    Alpine.data('streamChat', () => ({
        chatJoined: false,
        chatUsername: '',
        chatMessage: '',
        chatMessages: [],
        chatError: '',
        chatConnection: null,
        viewerCount: 0,

        joinChat() {
            const username = this.chatUsername.trim();
            if (!username) return;

            fetch('{% url "portfolio:stream_chat_token" %}?username=' + encodeURIComponent(username))
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        this.chatError = data.error;
                        return;
                    }
                    this.chatError = '';
                    this.chatJoined = true;
                    this.connectChat(data.token);
                })
                .catch(() => {
                    this.chatError = 'Failed to connect to chat';
                });
        },

        connectChat(token) {
            const chatRoomId = '{{ chat_room_id }}';
            if (!chatRoomId) {
                this.chatError = 'Chat not available';
                return;
            }

            try {
                const wsUrl = 'wss://edge.ivschat.us-east-2.amazonaws.com';
                this.chatConnection = new WebSocket(wsUrl, [token]);

                this.chatConnection.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.Type === 'MESSAGE') {
                        this.chatMessages.push({
                            id: data.Id,
                            username: data.Attributes?.displayName || 'anon',
                            text: data.Content,
                        });
                        this.$nextTick(() => {
                            const container = this.$refs.chatMessages;
                            if (container) container.scrollTop = container.scrollHeight;
                        });
                    }
                };

                this.chatConnection.onerror = () => {
                    this.chatError = 'Chat connection error';
                };

                this.chatConnection.onclose = () => {
                    this.chatJoined = false;
                    this.chatError = 'Chat disconnected';
                };
            } catch (e) {
                this.chatError = 'Failed to connect to chat';
            }
        },

        sendMessage() {
            const text = this.chatMessage.trim();
            if (!text || !this.chatConnection) return;

            const payload = JSON.stringify({
                Action: 'SEND_MESSAGE',
                Content: text,
            });

            try {
                this.chatConnection.send(payload);
                this.chatMessage = '';
            } catch (e) {
                this.chatError = 'Failed to send message';
            }
        },
    }));
});
</script>
{% endblock content %}

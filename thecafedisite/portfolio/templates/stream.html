{% extends "base.html" %}
{% load static %}

{% block title %}Stream - thecafedisco{% endblock %}

{% block extra_head %}
{% if is_live %}
<script src="https://player.live-video.net/1.24.0/amazon-ivs-player.min.js"></script>
{% endif %}
{% endblock %}

{% block content %}
<div class="flex justify-center px-4 py-8"
     x-data="streamPage()"
     x-init="init()">
    <div style="width: 100%; max-width: 900px;">

        <div class="mb-6">
            <div class="flex items-center gap-2 mb-2">
                <span style="color: oklch(88.716% 0.09711 208.766); font-family: 'Monocraft-SemiBold', monospace;">%</span>
                <span class="typewriter-header text-white text-xl">./stream --live</span>
            </div>
        </div>

        <div class="typewriter-body">

        <!-- LIVE STATE -->
        <template x-if="isLive">
            <div>
                <!-- Video player -->
                <div class="tcd-stream-player mb-4">
                    <div class="tcd-stream-video-wrapper">
                        <video x-ref="liveVideo"
                               class="tcd-stream-video"
                               playsinline
                               muted></video>
                    </div>

                    <!-- Controls -->
                    <div class="tcd-stream-controls">
                        <div class="flex items-center flex-1">
                            <div class="tcd-stream-volume-track"
                                 x-ref="volumeTrack"
                                 :class="(volumeDragging || (isMobile && !muted)) && 'tcd-stream-volume-track--active'"
                                 @mousedown.prevent="startVolumeDrag($event)"
                                 @click="onVolumeClick()">
                                <div class="tcd-stream-volume-bar">
                                    <div class="tcd-stream-volume-fill" :style="'width: ' + (muted ? 0 : volume * 100) + '%'"></div>
                                    <div class="tcd-stream-volume-head" :style="'left: ' + (muted ? 0 : volume * 100) + '%'"></div>
                                    <div class="tcd-stream-volume-signals">
                                        <template x-for="i in 20" :key="i">
                                            <div class="tcd-stream-volume-signal" :class="(i / 20 * 100) <= (muted ? 0 : volume * 100) && 'active'">
                                                <div class="tcd-stream-volume-signal-top" :style="((volumeDragging || isMobile) && (i / 20 * 100) <= (muted ? 0 : volume * 100)) ? 'height: ' + (2 + (i * 0.6)) + 'px' : 'height: 0px'"></div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                            <div class="tcd-stream-volume-percent" :class="(volumeDragging || isMobile) && 'tcd-stream-volume-percent--visible'" x-text="Math.round((muted ? 0 : volume) * 100) + '%'"></div>
                            <button class="tcd-stream-mute-btn" @click="toggleMute()" :aria-label="muted ? 'Unmute' : 'Mute'">
                                <svg viewBox="0 0 24 24" shape-rendering="crispEdges">
                                    <rect x="3" y="15" width="4" height="6" class="tcd-mute-bar"/>
                                    <rect x="10" y="10" width="4" height="11" class="tcd-mute-bar"/>
                                    <rect x="17" y="5" width="4" height="16" class="tcd-mute-bar"/>
                                    <rect x="1" y="1" width="22" height="22" fill="none" stroke="#ffffff" stroke-width="2" x-show="muted"/>
                                    <line x1="1" y1="1" x2="23" y2="23" stroke="#ffffff" stroke-width="2" x-show="muted"/>
                                </svg>
                            </button>
                        </div>

                        <div class="flex items-center gap-3">
                            <!-- Quality selector -->
                            <div class="tcd-quality-dropdown" x-data="{ open: false }">
                                <button class="tcd-quality-btn" :class="isMobile && 'tcd-quality-btn--disabled'" :disabled="isMobile" @click="!isMobile && (open = !open)">
                                    <span x-text="currentQuality">auto</span>
                                    <svg x-show="!isMobile" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                                </button>
                                <div class="tcd-quality-menu" x-show="open && !isMobile" @click.outside="open = false" x-cloak>
                                    <template x-for="level in qualityLevels" :key="level.index">
                                        <button class="tcd-quality-option"
                                                :class="{ 'active': currentQualityIndex === level.index }"
                                                @click="setQuality(level.index); open = false"
                                                x-text="level.label"></button>
                                    </template>
                                    <button class="tcd-quality-option"
                                            :class="{ 'active': currentQualityIndex === -1 }"
                                            @click="setQuality(-1); open = false">auto</button>
                                </div>
                            </div>

                            <!-- Fullscreen -->
                            <button class="tcd-btn-fullscreen" @click="toggleFullscreen()">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Chat -->
                <div class="tcd-stream-chat" x-data="streamChat()">
                    <div class="tcd-stream-chat-header">
                        <span class="font-monocraft-semibold text-sm" style="color: oklch(88.716% 0.09711 208.766);">live chat</span>
                        <span class="font-monocraft-semibold text-xs text-gray-500" x-text="$store.stream.viewerCount + ' connected'"></span>
                    </div>

                    <div class="tcd-stream-chat-messages" x-ref="chatMessages">
                        <template x-for="msg in chatMessages" :key="msg.id">
                            <div class="tcd-stream-chat-msg">
                                <span class="font-monocraft-semibold text-sm" style="color: oklch(88.716% 0.09711 208.766);" x-text="msg.username + ':'"></span>
                                <span class="font-monocraft text-sm text-white" x-text="msg.text"></span>
                            </div>
                        </template>
                    </div>

                    <!-- Username gate -->
                    <div class="tcd-stream-chat-input" x-show="!chatJoined">
                        <input type="text" x-model="chatUsername"
                               class="flex-1 px-3 py-2 font-monocraft-semibold text-sm text-white tcd-input-focus"
                               style="background-color: #0d0d0d; border-radius: 0; outline: none;"
                               placeholder="enter username"
                               maxlength="50"
                               @keydown.enter="joinChat()">
                        <button class="tcd-btn px-4 py-2 font-monocraft-semibold text-sm"
                                @click="joinChat()"
                                :disabled="!chatUsername.trim()">JOIN</button>
                    </div>

                    <!-- Message input (after joining) -->
                    <div class="tcd-stream-chat-input" x-show="chatJoined" x-cloak>
                        <input type="text" x-model="chatMessage"
                               class="flex-1 px-3 py-2 font-monocraft-semibold text-sm text-white tcd-input-focus"
                               style="background-color: #0d0d0d; border-radius: 0; outline: none;"
                               placeholder="type a message..."
                               maxlength="500"
                               @keydown.enter="sendMessage()">
                        <button class="tcd-btn px-4 py-2 font-monocraft-semibold text-sm"
                                @click="sendMessage()"
                                :disabled="!chatMessage.trim()">SEND</button>
                    </div>

                    <div class="p-2 font-monocraft-semibold text-xs text-center" x-show="chatError" x-cloak
                         style="color: oklch(74.443% 0.17237 51.252);" x-text="chatError"></div>
                </div>
            </div>
        </template>

        <!-- OFFLINE STATE -->
        <template x-if="!isLive">
            <div>
                <div class="tcd-stream-offline">
                    <!-- Placeholder video -->
                    {% if stream_config.placeholder_video_url %}
                    <div class="tcd-stream-player mb-6 mx-auto" style="max-width: 960px;">
                        <div class="tcd-stream-video-wrapper" style="aspect-ratio: 4/3;">
                            <video id="placeholder-video" class="tcd-stream-video"
                                   src="{{ stream_config.placeholder_video_url }}"
                                   loop muted playsinline></video>
                            <canvas id="pixelate-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; z-index: 1;"></canvas>
                        </div>
                    </div>
                    {% else %}
                    <div class="tcd-stream-player mb-6 mx-auto" style="max-width: 960px;">
                        <div class="tcd-stream-video-wrapper flex items-center justify-center"
                             style="background-color: #0a0a0a; aspect-ratio: 4/3;">
                            <div class="text-center">
                                <span class="font-monocraft-semibold text-4xl" style="color: oklch(88.716% 0.09711 208.766 / 0.3);">_</span>
                                <p class="font-monocraft-semibold text-sm text-gray-500 mt-4">stream is offline</p>
                            </div>
                        </div>
                    </div>
                    {% endif %}

                    <!-- Next stream announcement -->
                    {% if stream_config.next_stream_date %}
                    <div class="p-4 mb-6" style="background-color: #1a1a1a; border: 1px solid oklch(88.716% 0.09711 208.766 / 0.3); border-radius: 0;">
                        <div class="flex items-center gap-2 mb-2">
                            <span style="color: oklch(88.716% 0.09711 208.766);">></span>
                            <span class="font-monocraft-semibold text-sm" style="color: oklch(88.716% 0.09711 208.766);">next stream</span>
                        </div>
                        {% if stream_config.next_stream_title %}
                        <p class="font-monocraft-semibold text-white mb-1">{{ stream_config.next_stream_title }}</p>
                        {% endif %}
                        <p class="font-monocraft text-sm text-gray-400">{{ stream_config.next_stream_date|date:"l, F j, Y \a\t g:i A" }}</p>
                    </div>
                    {% endif %}

                    <!-- Past streams link -->
                    {% if past_streams %}
                    <div class="mb-6">
                        <div class="flex items-center justify-between mb-3">
                            <span class="font-monocraft-semibold text-sm text-gray-400">recent streams</span>
                            <a href="{% url 'portfolio:stream_past' %}" class="font-monocraft-semibold text-sm hover:text-white transition-colors" style="color: oklch(88.716% 0.09711 208.766);">
                                view all >
                            </a>
                        </div>
                        <div class="space-y-2">
                            {% for session in past_streams %}
                            <a href="{% url 'portfolio:stream_replay' session.pk %}"
                               class="block p-3 transition-colors"
                               style="background-color: #1a1a1a; border: 1px solid oklch(88.716% 0.09711 208.766 / 0.2);"
                               up-follow>
                                <span class="font-monocraft-semibold text-sm text-white">{{ session.title }}</span>
                                <span class="font-monocraft text-xs text-gray-500 ml-2">{{ session.streamed_at|date:"M j, Y" }}</span>
                                {% if session.duration %}
                                <span class="font-monocraft text-xs text-gray-600 ml-2">{{ session.duration }}</span>
                                {% endif %}
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                    {% endif %}

                    <!-- Polling indicator -->
                    <p class="font-monocraft text-xs text-gray-600 text-center">
                        checking stream status<span x-text="pollingDots"></span>
                    </p>
                </div>
            </div>
        </template>

        </div>
    </div>
</div>

<script>
(function() {
    function register() {
    if (!Alpine.store('stream')) {
        Alpine.store('stream', {
            viewerCount: {{ viewer_count|default:0 }},
        });
    }

    Alpine.data('streamPage', () => ({
        isLive: {{ is_live|yesno:"true,false" }},
        playbackUrl: '{{ playback_url }}',
        playing: false,
        muted: true,
        volume: 1,
        volumeDragging: false,
        isMobile: typeof window !== 'undefined' && window.innerWidth <= 767,
        player: null,
        currentQuality: 'auto',
        currentQualityIndex: -1,
        qualityLevels: [],
        pollingDots: '',
        pollInterval: null,
        dotInterval: null,
        viewerPollInterval: null,

        init() {
            if (this._initialized) return;
            this._initialized = true;
            this.isMobile = window.innerWidth <= 767;
            this._resizeHandler = () => {
                this.isMobile = window.innerWidth <= 767;
            };
            window.addEventListener('resize', this._resizeHandler);
            if (this.isLive) {
                this.$nextTick(() => this.initPlayer());
                this.startViewerPolling();
            } else {
                sessionStorage.removeItem('tcd-chat-username');
                this.startPolling();
            }
        },

        destroy() {
            this._initialized = false;
            if (this._resizeHandler) {
                window.removeEventListener('resize', this._resizeHandler);
            }
            if (this._fullscreenHandler) {
                document.removeEventListener('fullscreenchange', this._fullscreenHandler);
                document.removeEventListener('webkitfullscreenchange', this._fullscreenHandler);
            }
            if (this.player) {
                this.player.pause();
                this.player.delete();
                this.player = null;
            }
            if (this.pollInterval) clearInterval(this.pollInterval);
            if (this.dotInterval) clearInterval(this.dotInterval);
            if (this.viewerPollInterval) clearInterval(this.viewerPollInterval);
        },

        startViewerPolling() {
            const update = () => {
                fetch('{% url "portfolio:stream_status" %}')
                    .then(r => r.json())
                    .then(data => {
                        Alpine.store('stream').viewerCount = data.viewer_count || 0;
                    })
                    .catch(() => {});
            };
            update();
            this.viewerPollInterval = setInterval(update, 20000);
        },

        initPlayer() {
            if (this.player) return;
            const video = this.$refs.liveVideo;
            if (!video || !this.playbackUrl) return;

            if (typeof IVSPlayer === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://player.live-video.net/1.24.0/amazon-ivs-player.min.js';
                script.onload = () => this.initPlayer();
                document.head.appendChild(script);
                return;
            }

            if (!IVSPlayer.isPlayerSupported) {
                video.src = this.playbackUrl;
                video.muted = true;
                video.play().catch(() => {});
                return;
            }

            const player = IVSPlayer.create();
            this.player = player;
            player.attachHTMLVideoElement(video);
            player.setMuted(true);

            player.addEventListener(IVSPlayer.PlayerState.PLAYING, () => {
                this.playing = true;
                this.updateQualityLevels();
            });

            player.addEventListener(IVSPlayer.PlayerState.IDLE, () => {
                this.playing = false;
            });

            player.addEventListener(IVSPlayer.PlayerEventType.QUALITY_CHANGED, () => {
                if (!this.qualityLevels.length) this.updateQualityLevels();
                this.updateCurrentQuality();
            });

            player.addEventListener(IVSPlayer.PlayerEventType.ERROR, (err) => {
                console.warn('IVS player error:', err);
            });

            const resumePlayback = () => {
                setTimeout(() => {
                    try { this.player && this.player.play(); } catch (err) {}
                    if (video.paused) video.play().catch(() => {});
                }, 100);
            };
            this._fullscreenHandler = () => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    resumePlayback();
                }
            };
            document.addEventListener('fullscreenchange', this._fullscreenHandler);
            document.addEventListener('webkitfullscreenchange', this._fullscreenHandler);
            video.addEventListener('webkitendfullscreen', resumePlayback);

            player.load(this.playbackUrl);
            player.play();
        },

        updateQualityLevels() {
            if (!this.player) return;
            const qualities = this.player.getQualities();
            this.qualityLevels = qualities.map((q, index) => ({
                index,
                quality: q,
                label: q.height + 'p',
                height: q.height,
            }));
        },

        updateCurrentQuality() {
            if (!this.player) return;
            const current = this.player.getQuality();
            if (this.player.isAutoQualityMode()) {
                this.currentQuality = current ? 'auto (' + current.height + 'p)' : 'auto';
                this.currentQualityIndex = -1;
            } else {
                this.currentQuality = current ? current.height + 'p' : 'auto';
                const idx = this.qualityLevels.findIndex(l => l.height === current?.height);
                this.currentQualityIndex = idx >= 0 ? idx : -1;
            }
        },

        setQuality(index) {
            if (!this.player) return;
            if (index === -1) {
                this.player.setAutoQualityMode(true);
                this.currentQuality = 'auto';
                this.currentQualityIndex = -1;
            } else {
                const level = this.qualityLevels[index];
                if (level) {
                    this.player.setAutoQualityMode(false);
                    this.player.setQuality(Alpine.raw(level.quality));
                    this.currentQualityIndex = index;
                }
            }
        },

        toggleMute() {
            this.muted = !this.muted;
            this.volume = 1;
            if (this.player) {
                try { this.player.setMuted(this.muted); } catch (err) {}
                try { this.player.setVolume(1); } catch (err) {}
            }
            const video = this.$refs.liveVideo;
            if (video) {
                video.muted = this.muted;
            }
        },

        onVolumeClick() {
            if (this.isMobile) {
                this.toggleMute();
            }
        },

        startVolumeDrag(e) {
            if (this.isMobile) return;
            const track = this.$refs.volumeTrack;
            if (!track) return;
            this.volumeDragging = true;

            const getX = (evt) => {
                if (evt.touches && evt.touches.length) return evt.touches[0].clientX;
                if (evt.changedTouches && evt.changedTouches.length) return evt.changedTouches[0].clientX;
                return evt.clientX;
            };

            const setVol = (clientX) => {
                const rect = track.getBoundingClientRect();
                this.volume = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                this.muted = false;
                if (this.player) {
                    try { this.player.setVolume(this.volume); } catch (err) {}
                    try { this.player.setMuted(false); } catch (err) {}
                }
                const video = this.$refs.liveVideo;
                if (video) {
                    video.muted = false;
                    video.volume = this.volume;
                }
            };

            setVol(getX(e));

            const onMove = (evt) => {
                if (evt.cancelable) evt.preventDefault();
                setVol(getX(evt));
            };
            const onUp = () => {
                this.volumeDragging = false;
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onUp);
                document.removeEventListener('touchcancel', onUp);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onUp);
            document.addEventListener('touchcancel', onUp);
        },

        toggleFullscreen() {
            const video = this.$refs.liveVideo;
            if (!video) return;
            const wrapper = video.closest('.tcd-stream-player');

            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                return;
            }

            if (wrapper && wrapper.requestFullscreen) {
                wrapper.requestFullscreen().catch(() => {
                    if (typeof video.webkitEnterFullscreen === 'function') {
                        video.webkitEnterFullscreen();
                    }
                });
            } else if (wrapper && wrapper.webkitRequestFullscreen) {
                wrapper.webkitRequestFullscreen();
            } else if (typeof video.webkitEnterFullscreen === 'function') {
                video.webkitEnterFullscreen();
            }
        },

        startPolling() {
            let dotCount = 0;
            this.dotInterval = setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                this.pollingDots = '.'.repeat(dotCount);
            }, 500);

            this.pollInterval = setInterval(() => {
                fetch('{% url "portfolio:stream_status" %}')
                    .then(r => r.json())
                    .then(data => {
                        Alpine.store('stream').viewerCount = data.viewer_count || 0;
                        if (data.is_live) {
                            this.isLive = true;
                            this.playbackUrl = data.playback_url;
                            clearInterval(this.pollInterval);
                            clearInterval(this.dotInterval);
                            this.$nextTick(() => this.initPlayer());
                            this.startViewerPolling();
                        }
                    })
                    .catch(() => {});
            }, 30000);
        },
    }));

    Alpine.data('streamChat', () => ({
        chatJoined: false,
        chatUsername: '',
        chatMessage: '',
        chatMessages: [],
        chatError: '',
        chatConnection: null,

        init() {
            const saved = sessionStorage.getItem('tcd-chat-username');
            if (saved) {
                this.chatUsername = saved;
                this.joinChat();
            }
        },

        joinChat() {
            const username = this.chatUsername.trim();
            if (!username) return;

            fetch('{% url "portfolio:stream_chat_token" %}?username=' + encodeURIComponent(username))
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        this.chatError = data.error;
                        return;
                    }
                    this.chatError = '';
                    this.chatJoined = true;
                    sessionStorage.setItem('tcd-chat-username', username);
                    this.connectChat(data.token);
                })
                .catch(() => {
                    this.chatError = 'Failed to connect to chat';
                });
        },

        connectChat(token) {
            const chatRoomId = '{{ chat_room_id }}';
            if (!chatRoomId) {
                this.chatError = 'Chat not available';
                return;
            }

            try {
                const wsUrl = 'wss://edge.ivschat.us-east-1.amazonaws.com';
                this.chatConnection = new WebSocket(wsUrl, [token]);

                this.chatConnection.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.Type === 'MESSAGE') {
                        this.chatMessages.push({
                            id: data.Id,
                            username: data.Sender?.Attributes?.displayName || data.Sender?.UserId || 'anon',
                            text: data.Content,
                        });
                        this.$nextTick(() => {
                            const container = this.$refs.chatMessages;
                            if (container) container.scrollTop = container.scrollHeight;
                        });
                    }
                };

                this.chatConnection.onerror = () => {
                    this.chatError = 'Chat connection error';
                };

                this.chatConnection.onclose = () => {
                    this.chatJoined = false;
                    this.chatError = 'Chat disconnected';
                };
            } catch (e) {
                this.chatError = 'Failed to connect to chat';
            }
        },

        sendMessage() {
            const text = this.chatMessage.trim();
            if (!text || !this.chatConnection) return;

            const payload = JSON.stringify({
                Action: 'SEND_MESSAGE',
                Content: text,
            });

            try {
                this.chatConnection.send(payload);
                this.chatMessage = '';
            } catch (e) {
                this.chatError = 'Failed to send message';
            }
        },
    }));
    }
    if (window.Alpine) {
        register();
        Alpine.initTree(document.querySelector('[x-data="streamPage()"]'));
    } else {
        document.addEventListener('alpine:init', register);
    }
})();
</script>

<script>
(function() {
    var attempts = 0;

    function init() {
        var video = document.getElementById('placeholder-video');
        var overlay = document.getElementById('pixelate-overlay');
        if (!video) {
            if (++attempts < 40) setTimeout(init, 50);
            return;
        }
        setup(video, overlay);
    }

    function setup(video, overlay) {

    var isMobile = window.matchMedia('(max-width: 767px)').matches;

    if (isMobile) {
        if (overlay) overlay.remove();
        video.style.opacity = '0';
        video.style.transition = 'opacity 0.8s ease-in';
        var played = false;
        function mobilePlay() {
            if (played) return;
            played = true;
            video.play().catch(function() {});
            video.style.opacity = '1';
        }
        video.addEventListener('canplay', mobilePlay, { once: true });
        if (video.readyState >= 3) mobilePlay();
        setTimeout(mobilePlay, 3000);
        return;
    }

    if (!overlay) return;
    var ctx = overlay.getContext('2d');

    var steps = [
        { res: 4,   scale: 0.25 },
        { res: 6,   scale: 0.3 },
        { res: 8,   scale: 0.35 },
        { res: 10,  scale: 0.4 },
        { res: 13,  scale: 0.45 },
        { res: 16,  scale: 0.5 },
        { res: 20,  scale: 0.55 },
        { res: 24,  scale: 0.6 },
        { res: 30,  scale: 0.65 },
        { res: 36,  scale: 0.7 },
        { res: 44,  scale: 0.74 },
        { res: 52,  scale: 0.78 },
        { res: 64,  scale: 0.82 },
        { res: 80,  scale: 0.85 },
        { res: 96,  scale: 0.88 },
        { res: 120, scale: 0.9 },
        { res: 150, scale: 0.93 },
        { res: 180, scale: 0.95 },
        { res: 220, scale: 0.97 },
        { res: 280, scale: 0.98 },
        { res: 350, scale: 0.99 },
        { res: 400, scale: 1.0 },
    ];
    var stepIndex = 0;
    var interval = 80;
    var aspect = 4 / 3;

    function drawStep(step) {
        var w = step.res;
        var h = Math.round(w / aspect);
        overlay.width = w;
        overlay.height = h;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(video, 0, 0, w, h);
        overlay.style.transform = 'scale(' + step.scale + ')';
    }

    function runTransition() {
        video.pause();
        overlay.style.transition = 'transform ' + interval + 'ms ease-out';

        function tick() {
            if (stepIndex >= steps.length) {
                overlay.style.transition = 'opacity 0.15s ease-out';
                overlay.style.opacity = '0';
                setTimeout(function() { overlay.remove(); }, 150);
                video.play().catch(function() {});
                return;
            }
            drawStep(steps[stepIndex]);
            stepIndex++;
            setTimeout(tick, interval);
        }

        overlay.style.transition = 'none';
        drawStep(steps[0]);
        stepIndex = 1;
        setTimeout(tick, interval);
    }

    video.addEventListener('canplay', runTransition, { once: true });
    if (video.readyState >= 3) runTransition();
    }

    init();
})();
</script>

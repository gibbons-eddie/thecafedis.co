# HTTP block -- Certbot adds listen 443 ssl + redirect automatically
# After running: sudo certbot --nginx -d thecafedis.co -d www.thecafedis.co
server {
    listen 80;
    server_name thecafedis.co www.thecafedis.co;

    server_tokens off;

    location /static/ {
        alias /home/ubuntu/thecafedisite/thecafedisite/static_root/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    location / {
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 100M;
}
